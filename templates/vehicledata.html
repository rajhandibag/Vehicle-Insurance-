<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Insurance Prediction</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="main">
    <div class="card">
        <h1>🚗 Vehicle Insurance Predictor</h1>
        <p class="subtitle">Enter details to check insurance response</p>

        <form method="post" action="/" class="form-grid">

            <div class="input-group">
                <label>Gender</label>
                <select name="Gender">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="input-group">
                <label>Age</label>
                <input type="number" name="Age" required>
            </div>

            <div class="input-group">
                <label>Driving License</label>
                <select name="Driving_License">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-group">
                <label>Region Code</label>
                <input type="number" step="0.01" name="Region_Code" required>
            </div>

            <div class="input-group">
                <label>Previously Insured</label>
                <select name="Previously_Insured">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-group">
                <label>Annual Premium</label>
                <input type="number" step="0.01" name="Annual_Premium" required>
            </div>

            <div class="input-group">
                <label>Policy Sales Channel</label>
                <input type="number" step="0.01" name="Policy_Sales_Channel" required>
            </div>

            <div class="input-group">
                <label>Vintage</label>
                <input type="number" name="Vintage" required>
            </div>

            <div class="input-group">
                <label>Vehicle Age &lt; 1 Year</label>
                <select name="Vehicle_Age_lt_1_Year">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-group">
                <label>Vehicle Age &gt; 2 Years</label>
                <select name="Vehicle_Age_gt_2_Years">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-group">
                <label>Vehicle Damage</label>
                <select name="Vehicle_Damage_Yes">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <button type="submit" class="btn">Predict</button>
        </form>

        <form method="get" action="/train">
            <button class="train-btn">⚡ Train Model</button>
        </form>

        {% if context %}
        <div class="result">
            <h2>{{ context }}</h2>
        </div>
        {% endif %}
    </div>
</div>

</body>
</html>
